name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-typecheck-build:
    name: Lint • Typecheck • Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: wedding
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/wedding
      REDIS_URL: redis://localhost:6379
      KAFKA_BROKERS: localhost:19092
      JWT_SECRET: ci-secret-32-chars-aaaaaaaaaaaaaaaa
      JWT_REFRESH_SECRET: ci-secret-32-chars-bbbbbbbbbbbbbbbb
      MP_ACCESS_TOKEN: TEST-ci-dummy-access-token
      NEXT_PUBLIC_MP_PUBLIC_KEY: TEST-ci-dummy-public-key
      MP_STATEMENT_DESCRIPTOR: LISTA PRESENTES
      NEXT_PUBLIC_API_URL: http://localhost:8080
      API_PUBLIC_ORIGIN: http://localhost:8080
      APP_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Apply DB migrations
        run: pnpm db:migrate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: lint-typecheck-build
    timeout-minutes: 25
    if: ${{ github.event_name == 'pull_request' || github.ref == 'refs/heads/main' }}

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: wedding
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/wedding
      REDIS_URL: redis://localhost:6379
      KAFKA_BROKERS: localhost:19092
      JWT_SECRET: ci-secret-32-chars-aaaaaaaaaaaaaaaa
      JWT_REFRESH_SECRET: ci-secret-32-chars-bbbbbbbbbbbbbbbb
      MP_ACCESS_TOKEN: TEST-ci-dummy-access-token
      NEXT_PUBLIC_MP_PUBLIC_KEY: TEST-ci-dummy-public-key
      MP_STATEMENT_DESCRIPTOR: LISTA PRESENTES
      NEXT_PUBLIC_API_URL: http://localhost:8080
      API_PUBLIC_ORIGIN: http://localhost:8080
      APP_URL: http://localhost:3000
      COOKIE_DOMAIN: localhost
      COOKIE_SECURE: 'false'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Apply migrations
        run: pnpm db:migrate

      - name: Install Playwright browsers
        run: pnpm --filter @apps/web exec playwright install --with-deps chromium

      - name: Start API
        run: pnpm --filter @apps/api dev &
        env:
          API_PORT: 8080

      - name: Wait for API
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:8080/health | grep -q '"ok":true'; then
              echo "API is up"; exit 0
            fi
            sleep 2
          done
          echo "API did not come up"; exit 1

      - name: Build Next.js
        run: pnpm --filter @apps/web build

      - name: Run E2E
        run: pnpm --filter @apps/web start &
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080
          API_INTERNAL_URL: http://localhost:8080

      - name: Wait for Web
        run: |
          for i in {1..30}; do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 | grep -q "200"; then
              echo "Web is up"; exit 0
            fi
            sleep 2
          done
          echo "Web did not come up"; exit 1

      - name: Playwright tests
        run: pnpm --filter @apps/web test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7
